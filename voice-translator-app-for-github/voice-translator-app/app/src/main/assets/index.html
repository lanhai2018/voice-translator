<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .mode-switch {
            display: flex;
            background: #f0f0f0;
            border-radius: 10px;
            padding: 5px;
            margin-bottom: 30px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: #667eea;
            color: white;
        }
        .input-section {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
        }
        .mic-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 32px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
        }
        .mic-btn:active {
            transform: scale(0.95);
        }
        .mic-btn.recording {
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.7); }
            50% { box-shadow: 0 0 0 20px rgba(102, 126, 234, 0); }
        }
        .translate-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .output-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            min-height: 80px;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .output-text {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }
        .speak-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
        }
        .status {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 语音翻译</h1>
        
        <div class="mode-switch">
            <button class="mode-btn active" onclick="setMode('zh-en')">中→英</button>
            <button class="mode-btn" onclick="setMode('en-zh')">英→中</button>
        </div>
        
        <div class="input-section">
            <textarea id="inputText" placeholder="输入文字或点击麦克风说话..."></textarea>
        </div>
        
        <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
        
        <button class="translate-btn" onclick="translate()">翻 译</button>
        
        <div class="output-section">
            <div class="output-header">
                <span>翻译结果</span>
                <button class="speak-btn" onclick="speakOutput()">🔊</button>
            </div>
            <div class="output-text" id="outputText">等待翻译...</div>
        </div>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        let currentMode = 'zh-en';
        let isRecording = false;
        let recognition;

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;
            
            recognition.onresult = function(event) {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    }
                }
                if (finalTranscript) {
                    document.getElementById('inputText').value = finalTranscript;
                    translate();
                }
            };
            
            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                stopRecording();
            };
            
            recognition.onend = function() {
                stopRecording();
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update placeholder
            const inputText = document.getElementById('inputText');
            if (mode === 'zh-en') {
                inputText.placeholder = '输入中文或点击麦克风说话...';
            } else {
                inputText.placeholder = 'Type English or click microphone...';
            }
        }

        function toggleRecording() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别');
                return;
            }
            
            if (isRecording) {
                recognition.stop();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            isRecording = true;
            document.getElementById('micBtn').classList.add('recording');
            document.getElementById('status').textContent = '🎤 正在听取...';
            
            recognition.lang = currentMode === 'zh-en' ? 'zh-CN' : 'en-US';
            recognition.start();
        }

        function stopRecording() {
            isRecording = false;
            document.getElementById('micBtn').classList.remove('recording');
            document.getElementById('status').textContent = '';
        }

        function translate() {
            const input = document.getElementById('inputText').value.trim();
            if (!input) {
                document.getElementById('outputText').textContent = '请输入文字';
                return;
            }
            
            document.getElementById('status').textContent = '翻译中...';
            
            const fromLang = currentMode === 'zh-en' ? 'zh' : 'en';
            
            // Call Android translation
            if (typeof Android !== 'undefined') {
                const result = Android.translate(input, fromLang);
                document.getElementById('outputText').textContent = result;
                document.getElementById('status').textContent = '';
                
                // Auto speak
                const toLang = currentMode === 'zh-en' ? 'en' : 'zh';
                Android.speakText(result, toLang);
            } else {
                // Demo mode
                document.getElementById('outputText').textContent = '[Demo] ' + input;
                document.getElementById('status').textContent = '';
            }
        }

        function speakOutput() {
            const text = document.getElementById('outputText').textContent;
            if (text && text !== '等待翻译...' && typeof Android !== 'undefined') {
                const lang = currentMode === 'zh-en' ? 'en' : 'zh';
                Android.speakText(text, lang);
            }
        }
    </script>
</body>
</html>
